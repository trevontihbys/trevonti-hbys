<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Trevonti HBYS — Türkiye'nin yeni nesil, bulut tabanlı ve yapay zeka destekli Hastane Bilgi Yönetim Sistemi. 31 klinik modül, SGK entegrasyonu, FHIR R4 uyumlu.">
<meta name="keywords" content="HBYS, Hastane Bilgi Sistemi, SGK, FHIR, sağlık teknolojisi, cloud, yapay zeka">
<meta property="og:title" content="Trevonti HBYS — Yeni Nesil Hastane Sistemi">
<meta property="og:description" content="31 klinik modül, SGK Medula, Sağlık-Net, FHIR R4 ve AI destekli bulut tabanlı HBYS platformu.">
<title>Trevonti HBYS — Yeni Nesil Hastane Bilgi Yönetim Sistemi</title>
<style>
/* ── Reset & Base ─────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#fff;color:#1e293b;overflow-x:hidden}
a{text-decoration:none;color:inherit}

:root{
  --teal:#0d9488;--teal-dark:#0b7a71;--teal-light:#f0fdf4;
  --navy:#0f172a;--slate:#1e293b;--gray:#64748b;--lgray:#f1f5f9;
  --white:#fff;
  --grad:linear-gradient(135deg,#0f172a 0%,#0d3a3a 50%,#0d9488 100%);
}

/* ── Navbar ─ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(15,23,42,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:0 5%;height:64px;display:flex;align-items:center;justify-content:space-between;
  transition:.3s;
}
.nav-logo{display:flex;align-items:center;}
.nav-logo-text-group{display:flex;flex-direction:column;line-height:1.2;}
.nav-logo-main{display:flex;align-items:baseline;gap:6px;}
.nav-logo-trevonti{font-weight:800;font-size:17px;color:#fff;letter-spacing:0.5px;}
.nav-logo-hbys{font-weight:700;font-size:17px;color:var(--teal);letter-spacing:1px;}
.nav-logo-subtitle{font-size:9px;font-weight:600;color:#fff;opacity:0.9;letter-spacing:0.3px;white-space:nowrap;}
.nav-logo-tech{font-size:7.5px;font-weight:400;color:rgba(255,255,255,.6);white-space:nowrap;letter-spacing:0.2px;margin-top:2px;}

.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{color:rgba(255,255,255,.7);font-size:14px;font-weight:500;transition:.2s}
.nav-links a:hover{color:#fff}
.nav-cta{background:var(--teal);color:#fff !important;padding:8px 20px;border-radius:8px;font-weight:600 !important;font-size:13px !important;transition:.2s !important}
.nav-cta:hover{background:var(--teal-dark) !important}
.nav-menu-btn{display:none;background:none;border:none;cursor:pointer;color:#fff;font-size:22px}

.lang-dropdown{position:relative;margin-left:12px;}
.lang-dropdown-btn{
  background:transparent;border:1px solid rgba(255,255,255,0.3);
  color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;
  transition:all 0.2s;
}
.lang-dropdown-btn:hover{background:rgba(255,255,255,0.1);border-color:var(--teal);}
.lang-dropdown-btn i{font-size:10px;opacity:0.7;}
.lang-dropdown-menu{
  position:absolute;top:100%;right:0;margin-top:8px;
  background:#1e293b;border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;padding:6px 0;min-width:150px;max-height:300px;
  overflow-y:auto;box-shadow:0 8px 20px rgba(0,0,0,0.3);
  display:none;z-index:200;
}
.lang-dropdown-menu.show{display:block;}
.lang-option{
  padding:8px 16px;color:rgba(255,255,255,0.8);font-size:13px;
  cursor:pointer;transition:background 0.2s;white-space:nowrap;
}
.lang-option:hover{background:rgba(13,148,136,0.2);color:#fff;}
.lang-option.active{background:var(--teal);color:#fff;}

/* ── Hero ─ */
.hero{min-height:100vh;background:var(--grad);display:flex;align-items:center;padding:100px 5% 60px;position:relative;overflow:hidden}
.hero-bg-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(13,148,136,.15) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.hero-glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(13,148,136,.2) 0%,transparent 70%);top:-100px;right:-100px;pointer-events:none}
.hero-content{position:relative;max-width:640px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(13,148,136,.2);border:1px solid rgba(13,148,136,.4);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:#5eead4;margin-bottom:24px}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:#5eead4;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero-title{font-size:clamp(32px,5vw,56px);font-weight:800;color:#fff;line-height:1.15;margin-bottom:20px}
.hero-title span{color:#5eead4}
.hero-sub{font-size:18px;color:rgba(255,255,255,.7);line-height:1.7;margin-bottom:32px;max-width:520px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-pri{padding:14px 28px;background:var(--teal);color:#fff;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;border:none;display:inline-flex;align-items:center;gap:8px}
.btn-pri:hover{background:var(--teal-dark);transform:translateY(-1px)}
.btn-sec{padding:14px 28px;background:rgba(255,255,255,.08);color:#fff;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;border:1px solid rgba(255,255,255,.15);display:inline-flex;align-items:center;gap:8px}
.btn-sec:hover{background:rgba(255,255,255,.14)}
.hero-stats{display:flex;gap:32px;margin-top:48px;flex-wrap:wrap}
.hs-item{text-align:left}
.hs-val{font-size:32px;font-weight:800;color:#fff}
.hs-label{font-size:13px;color:rgba(255,255,255,.55);margin-top:2px}
.hero-right{position:absolute;right:5%;top:50%;transform:translateY(-50%);width:min(42%,480px);display:flex;flex-direction:column;gap:10px;pointer-events:none}
.hr-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;animation:floatIn .6s ease both}
@keyframes floatIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.hr-card:nth-child(1){animation-delay:.1s}
.hr-card:nth-child(2){animation-delay:.2s}
.hr-card:nth-child(3){animation-delay:.3s}
.hr-card:nth-child(4){animation-delay:.4s}
.hr-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hr-info{flex:1}
.hr-title{font-size:13px;font-weight:600;color:#fff}
.hr-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.hr-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap}
.hb-green{background:rgba(34,197,94,.2);color:#4ade80}
.hb-teal{background:rgba(13,148,136,.25);color:#5eead4}
.hb-blue{background:rgba(59,130,246,.2);color:#60a5fa}
.hb-amber{background:rgba(245,158,11,.2);color:#fcd34d}

section{padding:80px 5%}
.section-badge{display:inline-block;background:var(--teal-light);color:var(--teal);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:14px}
.section-title{font-size:clamp(26px,3.5vw,40px);font-weight:800;color:var(--navy);line-height:1.25;margin-bottom:14px}
.section-title span{color:var(--teal)}
.section-sub{font-size:17px;color:var(--gray);line-height:1.7;max-width:580px;margin-bottom:40px}
.center{text-align:center}
.center .section-sub{margin:0 auto 40px}

.problem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:60px}
.prob-card{background:#fff;border:1px solid #fee2e2;border-radius:14px;padding:24px;position:relative;overflow:hidden}
.prob-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#ef4444}
.prob-icon{font-size:28px;margin-bottom:12px}
.prob-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:8px}
.prob-desc{font-size:13px;color:var(--gray);line-height:1.6}
.prob-stat{font-size:22px;font-weight:800;color:#dc2626;margin-top:10px}

.features-bg{background:var(--lgray)}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.feat-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:24px;transition:.2s}
.feat-card:hover{border-color:var(--teal);transform:translateY(-3px);box-shadow:0 8px 24px rgba(13,148,136,.1)}
.feat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
.fi-teal{background:#f0fdf4}
.fi-blue{background:#eff6ff}
.fi-purple{background:#f5f3ff}
.fi-amber{background:#fffbeb}
.fi-red{background:#fef2f2}
.fi-green{background:#f0fdf4}
.feat-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:8px}
.feat-desc{font-size:13px;color:var(--gray);line-height:1.6}

.modules-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.mod-item{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;display:flex;align-items:center;gap:10px;transition:.15s}
.mod-item:hover{border-color:var(--teal);background:var(--teal-light)}
.mod-icon{font-size:18px;flex-shrink:0}
.mod-name{font-size:13px;font-weight:500;color:var(--slate)}

.integ-bg{background:var(--navy)}
.integ-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.integ-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;text-align:center;transition:.2s}
.integ-card:hover{background:rgba(255,255,255,.1);border-color:rgba(13,148,136,.4)}
.ic-icon{font-size:32px;margin-bottom:10px}
.ic-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px}
.ic-desc{font-size:12px;color:rgba(255,255,255,.5)}
.ic-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;margin-top:8px;background:rgba(34,197,94,.2);color:#4ade80}

.ai-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.ai-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:28px;position:relative;overflow:hidden}
.ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ai-teal::before{background:var(--teal)}
.ai-blue::before{background:#3b82f6}
.ai-purple::before{background:#8b5cf6}
.ai-amber::before{background:#f59e0b}
.ai-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.ai-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.ai-title{font-size:16px;font-weight:700;color:var(--navy)}
.ai-algo{font-size:12px;color:var(--gray);margin-top:2px}
.ai-metric{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.am-val{font-size:40px;font-weight:800;color:var(--teal);line-height:1}
.am-label{font-size:12px;color:var(--gray)}
.am-ci{font-size:11px;color:var(--gray);font-family:'Consolas',monospace}
.ai-desc{font-size:13px;color:var(--gray);line-height:1.6}
.ai-note{font-size:11px;color:var(--gray);margin-top:10px;font-style:italic}

.comp-table{width:100%;border-collapse:collapse;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.comp-table th{padding:14px 18px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.comp-table td{padding:13px 18px;font-size:14px;border-bottom:1px solid #f1f5f9}
.comp-table tr:last-child td{border-bottom:none}
.ct-header-gray{background:#f8fafc;color:var(--gray)}
.ct-header-teal{background:var(--teal);color:#fff}
.check-yes{color:#15803d;font-size:16px;font-weight:700}
.check-no{color:#dc2626;font-size:16px}
.check-partial{color:#d97706;font-size:13px}
.trevonti-col{background:rgba(13,148,136,.04)}

.tech-bg{background:var(--lgray)}
.stack-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.stack-item{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;transition:.15s}
.stack-item:hover{border-color:var(--teal);transform:translateY(-2px)}
.si-icon{font-size:24px;margin-bottom:6px}
.si-name{font-size:12px;font-weight:600;color:var(--slate)}
.si-type{font-size:10px;color:var(--gray);margin-top:2px}

/* Yol Haritası — 6 aşamalı grid */
.roadmap-bg{background:var(--navy)}
.roadmap-line{display:grid;grid-template-columns:repeat(6,1fr);gap:0;position:relative}
.roadmap-line::before{content:'';position:absolute;top:22px;left:8%;right:8%;height:2px;background:rgba(255,255,255,.1);z-index:0}
.rm-item{text-align:center;position:relative;z-index:1;padding:0 4px}
.rm-dot{width:40px;height:40px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:3px solid}
.rm-done{background:var(--teal);border-color:var(--teal);color:#fff}
.rm-active{background:#0f172a;border-color:var(--teal);color:var(--teal);animation:glowPulse 2s infinite}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(13,148,136,.4)}50%{box-shadow:0 0 0 8px rgba(13,148,136,0)}}
.rm-quarter{font-size:9px;font-weight:700;color:var(--teal);margin-bottom:2px}
.rm-title{font-size:11px;font-weight:600;color:#fff;margin-bottom:3px}
.rm-desc{font-size:9px;color:rgba(255,255,255,.5);line-height:1.3}

.cta-bg{background:linear-gradient(135deg,var(--teal-dark),#0891b2)}
.cta-inner{display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap}
.cta-title{font-size:clamp(22px,3vw,36px);font-weight:800;color:#fff;margin-bottom:10px}
.cta-sub{font-size:16px;color:rgba(255,255,255,.8);max-width:480px}
.cta-btns{display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0}
.cta-btn-white{padding:13px 26px;background:#fff;color:var(--teal);border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.cta-btn-white:hover{background:#f0fdf4}
.cta-btn-outline{padding:13px 26px;background:transparent;color:#fff;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid rgba(255,255,255,.4);transition:.2s}
.cta-btn-outline:hover{border-color:#fff;background:rgba(255,255,255,.08)}

.footer{background:var(--navy);padding:60px 5% 30px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px}
.footer-logo{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.fl-box{width:34px;height:34px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
.fl-name{color:#fff;font-size:16px;font-weight:700}
.footer-desc{font-size:13px;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:20px}
.footer-links-title{font-size:12px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.footer-links a{display:block;font-size:13px;color:rgba(255,255,255,.6);margin-bottom:8px;transition:.2s}
.footer-links a:hover{color:#fff}
.footer-bottom{border-top:1px solid rgba(255,255,255,.08);padding-top:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.fb-copy{font-size:12px;color:rgba(255,255,255,.4)}
.fb-badges{display:flex;gap:10px;flex-wrap:wrap}
.fb-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;background:rgba(13,148,136,.2);color:var(--teal)}

@media(max-width:1024px){
  .hero-right{display:none}
  .modules-grid{grid-template-columns:repeat(3,1fr)}
  .stack-grid{grid-template-columns:repeat(4,1fr)}
  .footer-grid{grid-template-columns:1fr 1fr}
  .roadmap-line{grid-template-columns:repeat(3,1fr)}
  .roadmap-line::before{display:none}
}
@media(max-width:768px){
  .nav-links{display:none}
  .nav-menu-btn{display:block}
  .problem-grid,.feat-grid,.ai-grid,.sec-grid{grid-template-columns:1fr}
  .integ-grid,.modules-grid{grid-template-columns:repeat(2,1fr)}
  .stack-grid{grid-template-columns:repeat(3,1fr)}
  .roadmap-line{grid-template-columns:repeat(2,1fr);gap:12px}
  .roadmap-line::before{display:none}
  .footer-grid{grid-template-columns:1fr}
  .cta-inner{flex-direction:column}
  .hero-stats{gap:20px}
  .nav-logo-trevonti{font-size:15px !important}
  .nav-logo-hbys{font-size:15px !important}
  .nav-logo-subtitle{white-space:normal !important;font-size:8px}
  .nav-logo-tech{white-space:normal !important}
  .lang-dropdown{margin-left:0}
}
@media(max-width:480px){
  .integ-grid{grid-template-columns:1fr 1fr}
  .stack-grid{grid-template-columns:repeat(2,1fr)}
  .modules-grid{grid-template-columns:1fr 1fr}
  .roadmap-line{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:768px){
  .nav-links{width:100%;box-sizing:border-box}
  .nav-links a{width:100%;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
  .nav-cta{display:inline-block;width:auto;margin-top:8px}
  .lang-dropdown{margin-left:0;margin-top:8px;width:100%}
  .lang-dropdown-btn{width:100%;justify-content:space-between}
  .lang-dropdown-menu{position:static;width:100%;margin-top:4px;box-shadow:none}
  .hero{padding-top:120px;padding-bottom:80px}
  .hero-content{max-width:100%}
  .hero-stats{justify-content:space-between}
  .hs-item{flex:1;text-align:center}
  section{padding:60px 5%}
  .modules-grid{grid-template-columns:repeat(2,1fr)}
  .stack-grid{grid-template-columns:repeat(2,1fr)}
  .footer-bottom{flex-direction:column;align-items:flex-start}
  body{overflow-x:hidden}
  .comp-table{display:block;overflow-x:auto;white-space:nowrap}
  section{overflow-x:hidden;width:100%}
  .comp-table{display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .fade-in[style*="display:grid"]{grid-template-columns:1fr !important}
  .hero-stats{flex-wrap:wrap;justify-content:center}
  .hs-item{flex:0 0 auto;min-width:120px}
  .footer-bottom{flex-direction:column;align-items:flex-start}
  .lang-dropdown-menu{right:auto;left:0}
}

.fade-in{opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s}
.fade-in.visible{opacity:1;transform:none}

html[dir="rtl"] .nav-links{flex-direction:row-reverse}
html[dir="rtl"] .lang-dropdown{margin-left:0;margin-right:12px}
html[dir="rtl"] .lang-dropdown-menu{right:auto;left:0}
html[dir="rtl"] .hero-content{text-align:right}
html[dir="rtl"] .hero-stats{justify-content:flex-end}
html[dir="rtl"] .hero-right{right:auto;left:5%}
html[dir="rtl"] .hr-card{flex-direction:row-reverse}
html[dir="rtl"] .hr-badge{margin-left:0;margin-right:auto}
html[dir="rtl"] .hero-badge{flex-direction:row-reverse}
html[dir="rtl"] .btn-pri,html[dir="rtl"] .btn-sec{flex-direction:row-reverse}
html[dir="rtl"] .section-title,html[dir="rtl"] .section-sub{text-align:right}
html[dir="rtl"] .center .section-sub{margin-left:0;margin-right:auto}
html[dir="rtl"] .feat-card{text-align:right}
html[dir="rtl"] .mod-item{flex-direction:row-reverse}
html[dir="rtl"] .footer-links a{text-align:right}
html[dir="rtl"] .footer-bottom{flex-direction:row-reverse}
html[dir="rtl"] .cta-inner{flex-direction:row-reverse}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo"><div class="nav-logo-text-group"><div class="nav-logo-main"><span class="nav-logo-trevonti">TREVONTI</span><span class="nav-logo-hbys">HBYS</span></div><div class="nav-logo-subtitle" data-i18n="logo.subtitle"></div><div class="nav-logo-tech" data-i18n="logo.tech"></div></div></div>
  <div class="nav-links">
    <a href="#features" data-i18n="nav.features"></a><a href="#modules" data-i18n="nav.modules"></a><a href="#ai" data-i18n="nav.ai"></a>

tle: "Trevonti HIS is not a collection of separate modules — it's a fully integrated platform designed from the ground up.", cloud_title: "Cloud-Native Architecture", cloud_desc: "Kubernetes, Docker, Patroni HA PostgreSQL. No server purchase. No IT team for updates. Just open and use.", mobile_title: "Web + iOS + Android", mobile_desc: "Windows, macOS, iOS, Android — it doesn't matter. Full browser access from all computers, phones and tablets. Clinical staff can perform BCMA on any portable device.", ai_title: "AI Engine", ai_desc: "Sepsis early warning (AUC 0.979), 30-day readmission prediction (AUC 0.970), Turkish NLP, drug interaction CDS.", sgk_title: "Automated SGK Billing", sgk_desc: "SUT codes assigned automatically. Instant Medula provision. e-Invoice in UBL 2.1 format sent to GİB.", security_title: "KVKK & Security", security_desc: "AES-256-GCM field encryption. Cilium zero-trust network. Keycloak MFA. Immutable audit log. Full KVKK compliance.", integration_title: "National Integrations", integration_desc: "SGK Medula, Sağlık-Net (10 message types), e-Nabız FHIR R4, TİTS drug tracking, GİB e-Invoice — all built-in." }, modules: { badge: "Scope", title: "<span>31 Modules,</span> One Platform", subtitle: "From clinic to radiology, pharmacy to finance, AI to education — a complete hospital in one system.", footer_note: "✅ With 10 newly added modules, a total of 31 clinical and operational modules.", mod1: "HIS Core (Patient Management)", mod2: "CPOE — Computerized Provider Order Entry", mod3: "Clinical Decision Support", mod4: "LIS — Laboratory (HL7)", mod5: "RIS/PACS — Radiology", mod6: "Pharmacy (BCMA + FEFO)", mod7: "Operating Room (OR)", mod8: "ICU — Intensive Care", mod9: "Blood Bank (ISBT 128)", mod10: "Oncology (OIS)", mod11: "Cardiology (Cath Lab)", mod12: "Dialysis Management", mod13: "Pathology (Digital)", mod14: "IVF — In Vitro Fertilization", mod15: "Patient Portal + RPM", mod16: "Telemedicine (USBS)", mod17: "Finance + SGK Medula", mod18: "e-Invoice (UBL 2.1)", mod19: "Supply Chain Management (SCM)", mod20: "Call Center (CTI)", mod21: "CSSD Sterilization", mod22: "A: Population Health & Analytics", mod23: "B: Ambient AI / Voice Dictation → SOAP", mod24: "C: SGK Rejection Management", mod25: "D: Multi-Hospital Record Sharing", mod26: "E: 3D/4D Image Reconstruction", mod27: "F: VNA (Vendor Neutral Archive)", mod28: "G: AI Lesion Detection & Triage", mod29: "H: Mammography Module", mod30: "I: Teaching & Training Files", mod31: "J: Tiered Storage" }, integrations: { badge: "Integrations", title: "Full Integration with <span>Turkey's Healthcare Ecosystem</span>", subtitle: "Connected to all national systems without additional installation.", card1_name: "SGK Medula", card1_desc: "Provision, SUT billing, returns", card1_badge: "✓ Built-in", card2_name: "Sağlık-Net", card2_desc: "10 message types: POLKAYIT, TABURCU, YATAN...", card2_badge: "✓ Built-in", card3_name: "e-Nabız FHIR R4", card3_desc: "Patient history, HL7 FHIR 4.0.1", card3_badge: "✓ Built-in", card4_name: "GİB e-Invoice", card4_desc: "UBL 2.1, XAdES digital signature", card4_badge: "✓ Built-in", card5_name: "TİTS", card5_desc: "Drug tracking barcode system", card5_badge: "✓ Built-in", card6_name: "LOINC / ICD-10", card6_desc: "Lab codes and diagnosis standards", card6_badge: "✓ Built-in", card7_name: "DICOM / DICOMweb", card7_desc: "Radiology image standard, OHIF viewer", card7_badge: "✓ Built-in", card8_name: "e-Devlet OIDC", card8_desc: "TC identity verification, MERNIS integration", card8_badge: "✓ Built-in" }, ai: { badge: "Artificial Intelligence", title: "AI <span>Supporting</span> Clinical Decisions", subtitle: "4 AI models validated with 2,000 synthetic patients. Will be calibrated with pilot hospital data in Q3 2026.", disclaimer: "* All values are derived from synthetic data validation tests. Calibration with pilot hospital data is targeted for Q3 2026.", card1_title: "Sepsis Early Warning", card1_algo: "qSOFA + NEWS2 Hybrid Model", card1_auc: "AUC-ROC", card1_spec: "Specificity", card1_ci: "95% CI<br>0.973–0.985", card1_desc: "Runs automatically when vitals are recorded. Combines qSOFA 3 criteria + NEWS2 score to produce a risk score (0–1). If critical threshold is exceeded, an instant notification is sent to the nurse's mobile app.", card2_title: "30-Day Readmission", card2_algo: "LACE+ Algorithm + SHAP", card2_auc: "AUC-ROC", card2_sens: "Sensitivity", card2_ci: "95% CI<br>0.961–0.978", card2_desc: "Calculated automatically at discharge. Produces a risk score and SHAP explanation based on LACE+ factors (length of stay, acute admission, comorbidity, emergency visits). Social services are automatically engaged.", card3_title: "Drug Interaction CDS", card3_algo: "Rule Engine + Database", card3_catch: "Detection", card3_acc: "Accuracy", card3_ci: "1,000<br>order tests", card3_desc: "Responds in <50ms for every medication order. Screens for drug-drug, drug-allergy, drug-age, drug-pregnancy interactions. MAJOR interactions automatically block the order.", card4_title: "Turkish Clinical NLP", card4_algo: "Regex + Dictionary-Based Model", card4_acc1: "Accuracy", card4_acc2: "Drug/Diagnosis", card4_ci: "250<br>SOAP notes", card4_desc: "Automatically extracts diagnosis (ICD-10), medication (ATC), vitals and lab values from SOAP notes. Integrates with voice dictation. Extracted structured data is converted to FHIR R4 format." }, roadmap: { badge: "Roadmap", title: "Transparent <span>Progress</span>", subtitle: "Where we are, where we're going.", q1_quarter: "2025 Q4 – 2026 Q1", q1_title: "Development Complete", q1_desc: "31 modules, 12 sprints, 200+ tests. Web + iOS + Android. All integrations written.", q2_quarter: "2026 Q2", q2_title: "Brand & Infrastructure", q2_desc: "Trevonti brand, GitHub, LinkedIn, website, trademark application.", q3_quarter: "2026 Q3", q3_title: "Pilot & Investment", q3_desc: "Staging environment, first pilot hospital, Founders Hub Azure credits.", q4_quarter: "2026 Q4", q4_title: "S . Die Medikationsfehlerrate in der Türkei ist 3× höher als der europäische Durchschnitt.", card3_stat: "3× Fehler" }, features: { badge: "Lösung", title: "Alles <span>Integriert,</span> Nichts Extra", subtitle: "Trevonti KIS ist keine Sammlung separater Module — es ist eine vollständig integrierte Plattform, die von Grund auf neu entwickelt wurde.", cloud_title: "Cloud-native Architektur", cloud_desc: "Kubernetes, Docker, Patroni HA PostgreSQL. Kein Serverkauf. Kein IT-Team für Updates. Einfach öffnen und nutzen.", mobile_title: "Web + iOS + Android", mobile_desc: "Windows, macOS, iOS, Android — egal. Voller Browserzugriff von allen Computern, Telefonen und Tablets. Klinisches Personal kann BCMA auf jedem tragbaren Gerät durchführen.", ai_title: "KI-Engine", ai_desc: "Sepsis-Frühwarnung (AUC 0.979), 30-Tage-Wiederaufnahmevorhersage (AUC 0.970), Türkisches NLP, Arzneimittelinteraktions-CDS.", sgk_title: "Automatisierte SGK-Abrechnung", sgk_desc: "SUT-Codes werden automatisch zugewiesen. Sofortige Medula-Bereitstellung. E-Invoice im UBL 2.1-Format an GİB gesendet.", security_title: "KVKK & Sicherheit", security_desc: "AES-256-GCM Feldverschlüsselung. Cilium Zero-Trust-Netzwerk. Keycloak MFA. Unveränderliches Audit-Log. Vollständige KVKK-Konformität.", integration_title: "Nationale Integrationen", integration_desc: "SGK Medula, Sağlık-Net (10 Nachrichtentypen), e-Nabız FHIR R4, TİTS Arzneimittelverfolgung, GİB E-Invoice — alles integriert." }, modules: { badge: "Umfang", title: "<span>31 Module,</span> Eine Plattform", subtitle: "Von der Klinik zur Radiologie, von der Apotheke zur Finanz, von KI zur Ausbildung — ein komplettes Krankenhaus in einem System.", footer_note: "✅ Mit 10 neu hinzugefügten Modulen insgesamt 31 klinische und operative Module.", mod1: "KIS Core (Patientenverwaltung)", mod2: "CPOE — Elektronische Auftragserfassung", mod3: "Klinische Entscheidungsunterstützung", mod4: "LIS — Labor (HL7)", mod5: "RIS/PACS — Radiologie", mod6: "Apotheke (BCMA + FEFO)", mod7: "OP (Operationssaal)", mod8: "IPS — Intensivpflege", mod9: "Blutbank (ISBT 128)", mod10: "Onkologie (OIS)", mod11: "Kardiologie (Herzkatheterlabor)", mod12: "Dialysemanagement", mod13: "Pathologie (Digital)", mod14: "IVF — In-vitro-Fertilisation", mod15: "Patientenportal + RPM", mod16: "Telemedizin (USBS)", mod17: "Finanzen + SGK Medula", mod18: "E-Rechnung (UBL 2.1)", mod19: "Lieferkettenmanagement (SCM)", mod20: "Callcenter (CTI)", mod21: "CSSD Sterilisation", mod22: "A: Bevölkerungsgesundheit & Analytik", mod23: "B: Ambient AI / Sprachdiktat → SOAP", mod24: "C: SGK-Ablehnungsmanagement", mod25: "D: Multiklinik-Datenaustausch", mod26: "E: 3D/4D-Bildrekonstruktion", mod27: "F: VNA (Herstellerneutrales Archiv)", mod28: "G: KI-Läsionserkennung & Triage", mod29: "H: Mammographiemodul", mod30: "I: Lehr- und Schulungsunterlagen", mod31: "J: Tiered Storage" }, integrations: { badge: "Integrationen", title: "Volle Integration mit dem <span>türkischen Gesundheitsökosystem</span>", subtitle: "Ohne zusätzliche Installation mit allen nationalen Systemen verbunden.", card1_name: "SGK Medula", card1_desc: "Bereitstellung, SUT-Abrechnung, Retouren", card1_badge: "✓ Integriert", card2_name: "Sağlık-Net", card2_desc: "10 Nachrichtentypen: POLKAYIT, TABURCU, YATAN...", card2_badge: "✓ Integriert", card3_name: "e-Nabız FHIR R4", card3_desc: "Patientenhistorie, HL7 FHIR 4.0.1", card3_badge: "✓ Integriert", card4_name: "GİB E-Rechnung", card4_desc: "UBL 2.1, XAdES digitale Signatur", card4_badge: "✓ Integriert", card5_name: "TİTS", card5_desc: "Arzneimittelverfolgungs-Barcodesystem", card5_badge: "✓ Integriert", card6_name: "LOINC / ICD-10", card6_desc: "Laborkodizes und Diagnosestandards", card6_badge: "✓ Integriert", card7_name: "DICOM / DICOMweb", card7_desc: "Radiologie-Bildstandard, OHIF Viewer", card7_badge: "✓ Integriert", card8_name: "e-Devlet OIDC", card8_desc: "TC-Identitätsprüfung, MERNIS-Integration", card8_badge: "✓ Integriert" }, ai: { badge: "Künstliche Intelligenz", title: "KI <span>unterstützt</span> klinische Entscheidungen", subtitle: "4 KI-Modelle validiert mit 2.000 synthetischen Patienten. Kalibrierung mit Pilotkrankenhausdaten für Q3 2026 geplant.", disclaimer: "* Alle Werte stammen aus synthetischen Datenvalidierungstests. Kalibrierung mit Pilotkrankenhausdaten ist für Q3 2026 geplant.", card1_title: "Sepsis-Frühwarnung", card1_algo: "qSOFA + NEWS2 Hybridmodell", card1_auc: "AUC-ROC", card1_spec: "Spezifität", card1_ci: "95% KI<br>0.973–0.985", card1_desc: "Läuft automatisch, wenn Vitalwerte erfasst werden. Kombiniert qSOFA 3 Kriterien + NEWS2-Score zur Erstellung eines Risikoscores (0–1). Bei Überschreitung des kritischen Schwellenwerts wird eine sofortige Benachrichtigung an die mobile App der Pflegekraft gesendet.", card2_title: "30-Tage-Wiederaufnahme", card2_algo: "LACE+ Algorithmus + SHAP", card2_auc: "AUC-ROC", card2_sens: "Sensitivität", card2_ci: "95% KI<br>0.961–0.978", card2_desc: "Automatische Berechnung bei Entlassung. Erstellt einen Risikoscore und eine SHAP-Erklärung basierend auf LACE+-Faktoren (Aufenthaltsdauer, akute Aufnahme, Komorbidität, Notfallbesuche). Soziale Dienste werden automatisch eingebunden.", card3_title: "Arzneimittelinteraktions-CDS", card3_algo: "Rule Engine + Datenbank", card3_catch: "Erkennung", card3_acc: "Genauigkeit", card3_ci: "1.000<br>Auftragstests", card3_desc: "Reagiert in <50ms bei jeder Medikamentenbestellung. Überprüft auf Arzneimittel-Arzneimittel-, Arzneimittel-Allergie-, Arzneimittel-Alter- und Arzneimittel-Schwangerschafts-Wechselwirkungen. MAJOR-Wechselwirkungen blockieren automatisch die Bestellung.", card4_title: "Türkisches Klinisches NLP", card4_algo: "Regex + Wörterbuchbasiertes Modell", card4_acc1: "Genauigkeit", card4_acc2: "Arzneimittel/Diagnose", card4_ci: "250<br>SOAP-Notizen", card4_desc: "Extrahiert automatisch Diagnose (ICD-10), Medikation (ATC), Vitalwerte und Laborwerte aus SOAP-Notizen. Integriert mit Sprachdiktat. Extrahierte strukturierte Daten werden in das FHIR R4-Format konvertiert." }, roadmap: { badge: "Roadmap", title: "Transparenter <span>Fortschritt</span>", subtitle: "Wo wir sind, wohin wir gehen.", q1_quarter: "2025 Q4 – 2026 Q1", q1_title: "Entwicklung abgeschlossen", q1_desc: "31 Module, 12 Sprints, 200+ Tests. Web + iOS + Android. Alle Integrationen geschrieben.", q2_quarter: "2026 Q2", q2_title: "Marke & Infrastruktur", q2_desc: "Marke Trevonti, GitHub, LinkedIn, Website, Markenanmeldung.", q3_quarter: "2026 Q3", q3_title: "Pilot & Investition", q3_desc: "Staging-Umgebung, erstes Pilotkrankenhaus, Founders Hub Azure credits.", q4_quarter: "2026 Q4", q4_title: "Staging & Tests", q4_desc: "Pilotkrankenhaus Integrationstests, Leistungsoptimierung.", q5_quarter: "2027 Q1", q5_title: "Unternehmensgründung & SİSE", q5_desc: "Vorbereitung der Unternehmensgründung, SİSE-Zertifizierungsantrag.", q6_quarter: "2027 Q2", q6_title: "SİSE & Wachstum", q6_desc: "SİSE-Zulassung, erste 3 Krankenhausverträge, Wachstumsstrategie." }, cta: { title: "Lassen Sie uns gemeinsam aufbauen", subtitle: "Wenn Sie Pilotkrankenhauspartner, Investor oder Branchenexperte sind — Sie sind hier richtig. Eine frühe Gelegenheit, die Zukunft dieses Systems mitzugestalten.", btn_primary: "📧 Kontaktieren Sie uns", btn_secondary: "🐙 Code ansehen" }, footer: { desc: "Das cloudbasierte, KI-gestützte Krankenhausinformationssystem der nächsten Generation der Türkei. Wir vereinen Patientensicherheit, operative Effizienz und nachhaltige Technologie auf einer einzigen Plattform.", platform_title: "Plattform", developer_title: "Entwickler", contact_title: "Kontakt", contact_general: "Allgemeine Anfragen", contact_pilot: "Pilotbewerbung", contact_investor: "Investor Relations", copy: "© 2025 Trevonti HBYS. Alle Rechte vorbehalten.", badge1: "KVKK Konform", badge2: "FHIR R4", badge3: "SGK Medula", badge4: "SİSE Bereit" } },
  fr: { logo: { subtitle: "Plateforme Hospitalière Entièrement Intégrée", tech: "Cloud-Native | IA | Technologie Durable" }, nav: { features: "Fonctionnalités", modules: "Modules", ai: "IA", integrations: "Intégrations", roadmap: "Feuille de route", github: "GitHub", contact: "Contact" }, hero: { badge: "Startup en phase de démarrage · Développement actif · Pilote T3 2026", title: "Le<br><span>système hospitalier</span><br>de nouvelle génération de Turquie", subtitle: "Nous sommes encore une startup — mais avec 31 modules cliniques, une aide à la décision basée sur l'IA et une intégration nationale complète, nous défions les meilleurs du secteur. Nous construisons pour devenir le meilleur SIH de Turquie.", btn_primary: "📧 Postuler pour le pilote", btn_secondary: "🐙 Voir sur GitHub", card1_title: "Alerte précoce de septicémie", card1_sub: "qSOFA + NEWS2 Hybride", card2_title: "SGK Medula", card2_sub: "Facturation automatisée", card2_badge: "Intégré", card3_title: "KVKK & FHIR R4", card3_sub: "Infrastructure entièrement conforme", card3_badge: "Conforme", card4_title: "iOS + Android + Web", card4_sub: "Aucune installation requise" }, stats: { modules: "Modules cliniques", tests: "Tests unitaires", platforms: "Plateformes", sla: "Objectif SLA" }, problem: { badge: "Problème", title: "<span>78%</span> des hôpitaux en Turquie utilisent des systèmes obsolètes", subtitle: "Logiciels SIH basés sur serveur, vieux de 10 à 20 ans ; sans accès mobile, IA et intégration nationale de la santé.", card1_title: "Pas d'accès mobile", card1_desc: "Les infirmières effectuent la vérification BCMA sur papier. Les médecins ne peuvent pas accéder au système à distance. Télémédecine impossible.", card1_stat: "0% Mobile", card2_title: "Perte de revenus SGK", card2_desc: "La saisie manuelle des codes SUT fait manquer aux hôpitaux une part importante des paiements SGK auxquels ils ont droit.", card2_stat: "12% Perte", card3_title: "Erreurs médicamenteuses", card3_desc: "Les systèmes de commande papier ne peuvent pas vérifier les interactions médicamenteuses. Le taux d'erreur médicamenteuse en Turquie est 3× supérieur à la moyenne européenne.", card3_stat: "3× Erreurs" }, features: { badge: "Solution", title: "Tout <span>Intégré,</span> Rien en Plus", subtitle: "Trevonti SIH n'est pas une collection de modules séparés — c'est une plateforme entièrement intégrée conçue dès le départ.", cloud_title: "Architecture Cloud-Native", cloud_desc: "Kubernetes, Docker, Patroni HA PostgreSQL. Aucun achat de serveur. Aucune équipe IT pour les mises à jour. Ouvrez et utilisez.", mobile_title: "Web + iOS + Android", mobile_desc: "Windows, macOS, iOS, Android — peu importe. Accès complet par navigateur depuis tous les ordinateurs, téléphones et tablettes. Le personnel clinique peut effectuer BCMA sur tout appareil portable.", ai_title: "Moteur IA", ai_desc: "Alerte précoce de septicémie (AUC 0.979), prédiction de réadmission à 30 jours (AUC 0.970), NLP turc, CDS interactions médicamenteuses.", sgk_title: "Facturation SGK automatisée", sgk_desc: "Codes SUT attribués automatiquement. Provision Medula instantanée. Facture électronique au format UBL 2.1 envoyée à GİB.", security_title: "KVKK & Sécurité", security_desc: "Chiffrement de champ AES-256-GCM. Réseau zero-trust Cilium. Keycloak MFA. Journal d'audit immuable. Conformité KVKK totale.", integration_title: "Intégrations nationales", integration_desc: "SGK Medula, Sağlık-Net (10 types de messages), e-Nabız FHIR R4, suivi des médicaments TİTS, GİB e-Facture — tout intégré." }, modules: { badge: "Portée", title: "<span>31 Modules,</span> Une Plateforme", subtitle: "De la clinique à la radiologie, de la pharmacie aux finances, de l'IA à l'éducation — un hôpital complet dans un seul système.", footer_note: "✅ Avec 10 nouveaux modules ajoutés, un total de 31 modules cliniques et opérationnels.", mod1: "SIH Core (Gestion des patients)", mod2: "CPOE — Saisie électronique des ordonnances", mod3: "Aide à la décision clinique", mod4: "LIS — Laboratoire (HL7)", mod5: "RIS/PACS — Radiologie", mod6: "Pharmacie (BCMA + FEFO)", mod7: "Bloc opératoire (OR)", mod8: "USI — Soins intensifs", mod9: "Banque du sang (ISBT 128)", mod10: "Oncologie (OIS)", mod11: "Cardiologie (Salle de cathétérisme)", mod12: "Gestion de la dialyse", mod13: "Pathologie (Numérique)", mod14: "FIV — Fécondation in vitro", mod15: "Portail patient + RPM", mod16: "Télémédecine (USBS)", mod17: "Finances + SGK Medula", mod18: "Facture électronique (UBL 2.1)", mod19: "Chaîne d'approvisionnement (SCM)", mod20: "Centre d'appels (CTI)", mod21: "Stérilisation CSSD", mod22: "A: Santé de la population & Analytique", mod23: "B: IA ambiante / Dictée vocale → SOAP", mod24: "C: Gestion des rejets SGK", mod25: "D: Partage de dossiers multi-hôpitaux", mod26: "E: Reconstruction d'images 3D/4D", mod27: "F: VNA (Archive neutre vis-à-vis du fournisseur)", mod28: "G: Détection de lésions par IA & Triage", mod29: "H: Module de mammographie", mod30: "I: Fichiers pédagogiques et de formation", mod31: "J: Stockage à plusieurs niveaux" }, integrations: { badge: "Intégrations", title: "Intégration complète avec l'<span>écosystème de santé turc</span>", subtitle: "Connecté à tous les systèmes nationaux sans installation supplémentaire.", card1_name: "SGK Medula", card1_desc: "Provision, facturation SUT, retours", card1_badge: "✓ Intégré", card2_name: "Sağlık-Net", card2_desc: "10 types de messages: POLKAYIT, TABURCU, YATAN...", card2_badge: "✓ Intégré", card3_name: "e-Nabız FHIR R4", card3_desc: "Historique du patient, HL7 FHIR 4.0.1", card3_badge: "✓ Intégré", card4_name: "GİB e-Facture", card4_desc: "UBL 2.1, signature numérique XAdES", card4_badge: "✓ Intégré", card5_name: "TİTS", card5_desc: "Système de suivi des médicaments par code-barres", card5_badge: "✓ Intégré", card6_name: "LOINC / ICD-10", card6_desc: "Codes de laboratoire et normes de diagnostic", card6_badge: "✓ Intégré", card7_name: "DICOM / DICOMweb", card7_desc: "Norme d'image radiologique, visualiseur OHIF", card7_badge: "✓ Intégré", card8_name: "e-Devlet OIDC", card8_desc: "Vérification d'identité TC, intégration MERNIS", card8_badge: "✓ Intégré" }, ai: { badge: "Intelligence Artificielle", title: "L'IA <span>au service</span> des décisions cliniques", subtitle: "4 modèles d'IA validés avec 2 000 patients synthétiques. Sera calibré avec les données de l'hôpital pilote au T3 2026.", disclaimer: "* Toutes les valeurs proviennent de tests de validation de données synthétiques. Le calibrage avec les données de l'hôpital pilote est prévu pour le T3 2026.", card1_title: "Alerte précoce de septicémie", card1_algo: "Modèle hybride qSOFA + NEWS2", card1_auc: "AUC-ROC", card1_spec: "Spécificité", card1_ci: "IC 95%<br>0.973–0.985", card1_desc: "Fonctionne automatiquement lorsque les signes vitaux sont enregistrés. Combine les 3 critères qSOFA + le score NEWS2 pour produire un score de risque (0–1). Si le seuil critique est dépassé, une notification instantanée est envoyée à l'application mobile de l'infirmière.", card2_title: "Réadmission à 30 jours", card2_algo: "Algorithme LACE+ + SHAP", card2_auc: "AUC-ROC", card2_sens: "Sensibilité", card2_ci: "IC 95%<br>0.961–0.978", card2_desc: "Calculé automatiquement à la sortie. Produit un score de risque et une explication SHAP basée sur les facteurs LACE+ (durée du séjour, admission aiguë, comorbidité, visites aux urgences). Les services sociaux sont automatiquement engagés.", card3_title: "CDS Interactions médicamenteuses", card3_algo: "Moteur de règles + Base de données", card3_catch: "Détection", card3_acc: "Précision", card3_ci: "1 000<br>tests de commande", card3_desc: "Répond en <50ms pour chaque commande de médicament. Dépiste les interactions médicament-médicament, médicament-allergie, médicament-âge, médicament-grossesse. Les interactions MAJEURES bloquent automatiquement la commande.", card4_title: "NLP Clinique Turc", card4_algo: "Modèle basé sur Regex + Dictionnaire", card4_acc1: "Précision", card4_acc2: "Médicament/Diagnostic", card4_ci: "250<br>notes SOAP", card4_desc: "Extrait automatiquement le diagnostic (ICD-10), les médicaments (ATC), les signes vitaux et les valeurs de laboratoire des notes SOAP. S'intègre à la dictée vocale. Les données structurées extraites sont converties au format FHIR R4." }, roadmap: { badge: "Feuille de route", title: "Progrès <span>transparent</span>", subtitle: "Où nous sommes, où nous allons.", q1_quarter: "2025 Q4 – 2026 Q1", q1_title: "Développement terminé", q1_desc: "31 modules, 12 sprints, 200+ tests. Web + iOS + Android. Toutes les intégrations écrites.", q2_quarter: "2026 Q2", q2_title: "Marque & Infrastructure", q2_desc: "Marque Trevonti, GitHub, LinkedIn, site web, demande de marque déposée.", q3_quarter: "2026 Q3", q3_title: "Pilote & Investissement", q3_desc: "Environnement de staging, premier hôpital pilote, crédits Founders Hub Azure.", q4_quarter: "2026 Q4", q4_title: "Staging & Tests", q4_desc: "Tests d'intégration de l'hôpital pilote, optimisation des performances.", q5_quarter: "2027 Q1", q5_title: "Création d'entreprise & SİSE", q5_desc: "Préparation de la création d'entreprise, demande de certification SİSE.", q6_quarter: "2027 Q2", q6_title: "SİSE & Croissance", q6_desc: "Approbation SİSE, 3 premiers contrats hospitaliers, stratégie de croissance." }, cta: { title: "Construisons ensemble", subtitle: "Si vous êtes un partenaire hospitalier pilote, un investisseur ou un expert du secteur — vous êtes au bon endroit. Une opportunité précoce de façonner l'avenir de ce système.", btn_primary: "📧 Contactez-nous", btn_secondary: "🐙 Voir le code" }, footer: { desc: "Le système d'information hospitalier de nouvelle génération de la Turquie, basé sur le cloud et alimenté par l'IA. Nous réunissons la sécurité des patients, l'efficacité opérationnelle et la technologie durable sur une seule plateforme.", platform_title: "Plateforme", developer_title: "Développeur", contact_title: "Contact", contact_general: "Demandes générales", contact_pilot: "Candidature pilote", contact_investor: "Relations investisseurs", copy: "© 2025 Trevonti HBYS. Tous droits réservés.", badge1: "Conforme KVKK", badge2: "FHIR R4", badge3: "SGK Medula", badge4: "Prêt pour SİSE" } },

 interacciones de medicamentos. La tasa de errores de medicación en Turquía es 3× el promedio europeo.", card3_stat: "3× Errores" }, features: { badge: "Solución", title: "Todo <span>Integrado,</span> Nada Extra", subtitle: "Trevonti SIH no es una colección de módulos separados — es una plataforma totalmente integrada diseñada desde cero.", cloud_title: "Arquitectura nativa de la nube", cloud_desc: "Kubernetes, Docker, Patroni HA PostgreSQL. Sin compra de servidor. Sin equipo de TI para actualizaciones. Solo abra y use.", mobile_title: "Web + iOS + Android", mobile_desc: "Windows, macOS, iOS, Android — no importa. Acceso completo por navegador desde todas las computadoras, teléfonos y tabletas. El personal clínico puede realizar BCMA en cualquier dispositivo portátil.", ai_title: "Motor de IA", ai_desc: "Alerta temprana de sepsis (AUC 0.979), predicción de reingreso a 30 días (AUC 0.970), NLP turco, CDS de interacciones medicamentosas.", sgk_title: "Facturación SGK automatizada", sgk_desc: "Códigos SUT asignados automáticamente. Provisión Medula instantánea. Factura electrónica en formato UBL 2.1 enviada a GİB.", security_title: "KVKK & Seguridad", security_desc: "Cifrado de campo AES-256-GCM. Red de confianza cero Cilium. Keycloak MFA. Registro de auditoría inmutable. Cumplimiento total de KVKK.", integration_title: "Integraciones nacionales", integration_desc: "SGK Medula, Sağlık-Net (10 tipos de mensajes), e-Nabız FHIR R4, seguimiento de medicamentos TİTS, GİB e-Factura — todo integrado." }, modules: { badge: "Alcance", title: "<span>31 Módulos,</span> Una Plataforma", subtitle: "Desde la clínica hasta la radiología, desde la farmacia hasta las finanzas, desde la IA hasta la educación — un hospital completo en un solo sistema.", footer_note: "✅ Con 10 nuevos módulos añadidos, un total de 31 módulos clínicos y operativos.", mod1: "SIH Core (Gestión de pacientes)", mod2: "CPOE — Entrada electrónica de órdenes", mod3: "Soporte a la decisión clínica", mod4: "LIS — La         }
      });
      div.innerHTML = `<div class="ai-header"><div class="ai-icon" style="background:${card.iconBg}">${card.icon}</div><div><div class="ai-title" data-i18n="${card.titleKey}"></div><div class="ai-algo" data-i18n="${card.algoKey}"></div></div></div><div class="ai-metric">${metricHTML}</div><div class="ai-desc" data-i18n="${card.descKey}"></div>`;
      aiContainer.appendChild(div);
    });
  }
  // Roadmap
  const roadContainer = document.getElementById('roadmap-container');
  if (roadContainer) {
    for (let i = 1; i <= 6; i++) {
      const div = document.createElement('div'); div.className = 'rm-item';
      const dotClass = i <= 2 ? 'rm-done' : 'rm-active';
      const dotSymbol = i <= 2 ? '✓' : '→';
      div.innerHTML = `<div class="rm-dot ${dotClass}">${dotSymbol}</div><div class="rm-quarter" data-i18n="roadmap.q${i}_quarter"></div><div class="rm-title" data-i18n="roadmap.q${i}_title"></div><div class="rm-desc" data-i18n="roadmap.q${i}_desc"></div>`;
      roadContainer.appendChild(div);
    }
  }
}

function switchLanguage(lang) {
  const t = translations[lang] || translations.tr;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const val = key.split('.').reduce((o, k) => o?.[k], t);
    if (val) el.innerHTML = val;
  });
  document.querySelectorAll('.lang-option').forEach(o => o.classList.toggle('active', o.dataset.lang === lang));
  const names = { tr: 'TR', en: 'EN', de: 'DE', fr: 'FR', es: 'ES', pt: 'PT', it: 'IT', ar: 'AR', zh: '中文', ja: '日本語', ko: '한국어' };
  document.getElementById('currentLangDisplay').textContent = names[lang] || lang.toUpperCase();
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  localStorage.setItem('pref-lang', lang);
  document.getElementById('langDropdownMenu').classList.remove('show');
}

document.addEventListener('DOMContentLoaded', () => {
  buildDynamicContent();
  document.getElementById('langDropdownBtn').addEventListener('click', e => { e.stopPropagation(); document.getElementById('langDropdownMenu').classList.toggle('show'); });
  document.querySelectorAll('.lang-option').forEach(o => o.addEventListener('click', e => switchLanguage(o.dataset.lang)));
  document.addEventListener('click', () => document.getElementById('langDropdownMenu').classList.remove('show'));
  const savedLang = localStorage.getItem('pref-lang') || 'tr';
  switchLanguage(savedLang);
  const observer = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.1 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
});

function toggleMenu() {
  const l = document.querySelector('.nav-links');
  if (l.style.display === 'flex') l.style.display = 'none';
  else {
    l.style.display = 'flex'; l.style.flexDirection = 'column'; l.style.position = 'absolute';
    l.style.top = '64px'; l.style.left = '0'; l.style.right = '0';
    l.style.background = '#0f172a'; l.style.padding = '20px'; l.style.gap = '16px';
  }
}
</script>
</body>
</html>
