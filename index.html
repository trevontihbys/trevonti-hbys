<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trevonti HBYS | Çok Yakında</title>
    <style>
        :root {
            --primary-blue: #1a4a7a;
            --accent-green: #2ecc71;
            --text-dark: #2c3e50;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-dark);
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            max-width: 600px;
            width: 90%;
            margin: 20px;
        }
        .logo-img {
            max-width: 250px;
            height: auto;
            margin-bottom: 1.5rem;
        }
        .tagline {
            font-size: 1.25rem;
            color: #576574;
            margin-bottom: 2rem;
            font-weight: 500;
        }
        .pillars {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
            gap: 10px;
        }
        .pillar {
            color: var(--primary-blue);
            font-weight: 700;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 8px;
            flex: 1;
        }
        .status-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 2.5rem;
            border: 1px solid #c8e6c9;
        }
        .contact {
            font-size: 1rem;
            color: var(--text-dark);
            border-top: 1px solid #eee;
            padding-top: 2rem;
        }
        .contact a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 700;
        }
        .contact a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Trevonti Logo.png" alt="Trevonti Logo" class="logo-img">
        
        <div class="tagline">Yeni Nesil Bulut-Yerel Hastane Platformu</div>
        
        <div class="pillars">
            <div class="pillar">Hasta Güvenliği</div>
            <div class="pillar">Hastane Verimliliği</div>
            <div class="pillar">Sürdürülebilir Teknoloji</div>
        </div>

        <div class="status-badge">
            🚀 Geliştirme Aşamasında - Çok Yakında
        </div>

        <div class="contact">
            İş Birliği ve İletişim: <br>
            <a href="mailto:trevonti.hbys@gmail.com">trevonti.hbys@gmail.com</a>
        </div>
    </div>

</body>
</html>
